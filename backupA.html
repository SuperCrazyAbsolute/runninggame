<!DOCTYPE html>
<html>
version 0.4
<head>
  <title>Running Game (backup)</title>
  <style>
    html,
    body {
      margin: 0;
      padding: 0;
      overflow: hidden;
      height: 100%;
      width: 100%;
    }

    canvas {
      display: block;
      position: absolute;
      top: 0;
      left: 0;
    }

    #title {
      position: absolute;
      top: 30%;
      left: 50%;
      transform: translateX(-50%);
      font-size: 36px;
      font-weight: bold;
      color: black;
      z-index: 10;
    }

    #startButton {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      padding: 20px 40px;
      font-size: 24px;
      cursor: pointer;
      background-color: green;
      color: black;
      border: none;
      border-radius: 10px;
      z-index: 10;
    }
  </style>
</head>

<body>
  <div id="title">
    Running Game (test) (if stuck on reload, just open a new tab and go back in) //Backup file
  </div>
  <button id="startButton">Start Game</button>
  <canvas id="gameCanvas"></canvas>

  <script>
    let speederSpeed = 0.003
    let choice = 3
    let choiceB = 1
    let points = 0
    let obstacleType = 100
    let obstacleTypeB = 100
    let obstacleDown = 620
    let obstacleDownB = 620
    let pointColor = 'black'
    let obstacleSpeed = 10
    let obstacleSpeedB = 10
    let randomizeObstacleChoice = Math.floor(Math.random() * 100)
    let extraSpeed = 10
    let obstacleMoving = true
    let canChoose = true
    let canChooseB = true
    let canJump = true
    let canDig = true
    let playerColor = 'blue'
    let obstacleColor = 'white'
    let obstacleColorB = 'gray'
    let detect = 180
    let move = 1900
    let moveB = 1900
    let playermove = 600 // vertical position
    const groundLevel = 600
    const jumpHeight = 400
    let burstSpeed = 0
    let jumpspeed = 10
    let slowedJump = false
    let jumpingUp = false
    let fallingDown = false
    let isJumping = false
    let canBurst = true
    let paused = false
    let canContinue = true
    let canSlow = true
    let obstacleBAhead = false
    let stopOverrun = false
    let dificulty = 1

    function startGame() {
      document.getElementById('startButton').style.display = 'none'
      document.getElementById('title').style.display = 'none'

      const canvas = document.getElementById('gameCanvas')
      const ctx = canvas.getContext('2d')

      function resizeCanvas() {
        canvas.width = window.innerWidth
        canvas.height = window.innerHeight
      }

      resizeCanvas()
      window.addEventListener('resize', resizeCanvas)

      function frame() {
        moveEverything(canvas)
        drawEverything(ctx, canvas)
        checkLoseCondition()
        if (canContinue) {
          requestAnimationFrame(frame)
        }
      }

      requestAnimationFrame(frame)
    }
    function stopGame() {
      isJumping = false
      jumpingUp = false
      fallingDown = false
      obstacleMoving = false
      canJump = false
      canDig = false
      setTimeout(() => {
        alert(
          'You got too close to the obstacle and died! Click OK to try again'
        )
        location.reload();
        canContinue = false
      }, 1500)
    }

    function moveEverything(canvas) {
      // Move obstacle
      console.log('Choice B', choiceB)
      if (obstacleMoving) {
        if (move < -65) {
          if (canChoose) {
            choice = Math.floor(Math.random() * 4) + 1;
            canChoose = false
            choose()
            // console.log(choice)
            move = Math.round(canvas.width / 60) * 60;
          }
        }
        moveB -= obstacleSpeed
        move -= obstacleSpeed
        // console.log('move is', move)
        // console.log('moveB is', moveB)
      }
      if (moveB < -65 && dificulty > 2 && obstacleMoving) {
        if (canChooseB) {
          choiceB = Math.floor(Math.random() * 5) + 1;
          canChooseB = false
          chooseB()
          moveB = Math.round(canvas.width / 60) * 60;
        }
      }
      else {
        choiceB = 5 //set the choice to something that does not make a function
      }

      if (obstacleBAhead) { // makes the secondary obstacle ahead of the primary obstacle
        moveB = move + 700
        stopOverrun = true
      }
      dificulty += 0.001 // makes the game harder as it goes
      extraSpeed -= speederSpeed
      if (canSlow) {
        speederSpeed -= 0.0002
      }
      if (speederSpeed > 0.0005) {
        canSlow = false
      }
      if (extraSpeed < 0.03) {
        speederSpeed = 0
        extraSpeed = 0.03
        canSlow = false
      }
      points += 0.1 / (extraSpeed / 2) // counts player's points based on game's speed
      if (jumpingUp) {
        playermove -= jumpspeed / (extraSpeed / 5)
        if (playermove <= jumpHeight + 60 && !slowedJump && jumpingUp) {
          jumpspeed -= 6
          slowedJump = true
        }
        if (playermove <= jumpHeight) {
          playermove = jumpHeight
          jumpingUp = false
          setTimeout(() => {
            fallingDown = true
          }, 500 / extraSpeed) // stop at top
        }
      }

      // Handle fall down
      if (fallingDown) {
        playermove += jumpspeed / (extraSpeed / 5)
        if (playermove <= jumpHeight + 60 && slowedJump && fallingDown) {
          jumpspeed += 6
          slowedJump = false
        }
        if (playermove >= groundLevel) {
          playermove = groundLevel
          fallingDown = false
          isJumping = false
        }
      }
      if (paused === true) { // pause the game
        paused = false
        isJumping = false
        jumpingUp = false
        fallingDown = false
        obstacleMoving = false
        canJump = false
        canDig = false
        alert(
          'You paused the game. as of right now, this will cause you to automatically be moved to the ground'
        );
        playermove = 600
        obstacleMoving = true
        canJump = true
        canDig = true
      }
    }
    function choose() { // choose what type of obstacle the primary obstacle will be
      if (choice === 2) { // ladybug: moves underground where player might try to dig; faster
        obstacleType = 80
        obstacleDown = 740
        obstacleSpeed = 60 / (extraSpeed * 0.8)
        canChoose = true
        obstacleColor = 'red'
      }
      else if (choice === 1) { // egg: jump over or dig under; basic obstacle
        obstacleType = 100
        obstacleDown = 620
        obstacleSpeed = 60 / (extraSpeed)
        canChoose = true
        obstacleColor = 'tan'
      }
      else if (choice === 3) { // bird: moves in air where player would normally jump; faster
        obstacleType = 80
        obstacleDown = 500
        obstacleSpeed = 60 / (extraSpeed * 0.8)
        canChoose = true
        obstacleColor = 'blue'
      }
      else if (choice === 4 && dificulty > 2.5) { // unnamed: goes fast, then slows down (appears to move in opposite direction, but doesn't actually) make it harder to clear completely
        obsatcleType = 250
        obstacleDown = 620
        obstacleSpeed = 60 / (extraSpeed * 0.7)
        setTimeout(() => {
          obstacleSpeed = 60 / (extraSpeed)
        }, extraSpeed * 100)
        obstacleColor = 'black'
        canChoose = true
      }
      else { // bug fixer
        choice = 1
        choose()
      }
    }
    function chooseB() {
      if (choiceB === 2) {
        obstacleTypeB = 80
        obstacleDownB = 740
        obstacleSpeedB = 1
        obstacleColorB = 'red'
        stopOverrun = false
        obstacleBAhead = false
        moveB = move
        canChooseB = true
      }
      if (choiceB === 3) {
        obstacleTypeB = 80
        obstacleDownB = 500
        obstacleSpeedB = 15
        obstacleColorB = 'blue'
        stopOverrun = false
        obstacleBAhead = false
        moveB = move
        canChooseB = true
      }
      if (choiceB === 1) {
        obstacleTypeB = 80
        obstacleDownB = 740
        obstacleSpeedB = 1
        obstacleColorB = 'red'
        obstacleBAhead = true
        canChooseB = true
      }
      if (choiceB === 4) {
        obstacleTypeB = 80
        obstacleDownB = 500
        obstacleSpeedB = 15
        obstacleColorB = 'blue'
        obstacleBAhead = true
        canChooseB = true
      }
    }
    function drawEverything(ctx, canvas) {
      ctx.clearRect(0, 0, canvas.width, canvas.height)

      ctx.fillStyle = '#1ef3fa' // Sky
      ctx.fillRect(0, 0, canvas.width, canvas.height)

      ctx.fillStyle = 'green' // Ground
      ctx.fillRect(0, 700, canvas.width, canvas.height - 700)

      ctx.fillStyle = obstacleColor // Obstacle
      ctx.fillRect(move, obstacleDown, 65, obstacleType)

      ctx.fillStyle = obstacleColorB // Secondary Obstacle
      ctx.fillRect(moveB, obstacleDownB, 55, obstacleTypeB)

      ctx.fillStyle = playerColor // Player
      ctx.fillRect(detect, playermove, 120, 130)

      // Draw Points directly above player
      ctx.fillStyle = pointColor
      ctx.font = '20px Arial'
      ctx.textAlign = 'center'
      ctx.fillText(Math.floor(points), detect + 120 / 2, playermove - 10)
    }

    function checkLoseCondition() {
      const playerLeft = detect
      const playerRight = detect + 120
      const playerTop = playermove
      const playerBottom = playermove + 120
      const eggLeft = move
      const eggLeftB = moveB
      const eggTop = obstacleDown
      const eggTopB = obstacleDownB
      const eggBottom = obstacleDown + obstacleType
      const eggBottomB = obstacleDownB + obstacleTypeB

      const touchingLeftEdge =
        (eggLeft <= playerRight && eggLeft + 65 >= playerLeft)
      const touchingLeftEdgeB = (eggLeftB <= playerRight && eggLeftB + 55 >= playerLeft)
      const verticalOverlap = (playerBottom > eggTop && playerTop < eggBottom)
      const verticalOverlapB = (playerBottom > eggTopB && playerTop < eggBottomB)

      if (touchingLeftEdge && verticalOverlap) {
        playerColor = 'red'
        obstacleColor = 'orange'
        stopGame()
      }
      if (touchingLeftEdgeB && verticalOverlapB) {
        playerColor = 'red'
        obstacleColorB = 'orange'
        stopGame()
      }
      if (detect != 180) {
        console.log(detect)
        alert(
          'Error: the player is incorrecly placed on the screen.'
        )
        detect = 180
      }
      if (jumpingUp === true && fallingDown === true) {
        console.log(isJumping)
        console.log(fallingDown)
        alert(
          'Error: the player is jumping and falling at the same time'
        )
        location.reload()
      }
    }

    document
      .getElementById('startButton')
      .addEventListener('click', startGame)

    document.addEventListener('keydown', function (event) {
      if (event.key === ' ' && !isJumping && canJump) {
        isJumping = true
        jumpingUp = true
      }

      if (event.key === 'ArrowDown') {
        if (playermove < 850 && canDig) {
          playermove += 200
          if (playermove > 850) {
            playermove = 850
          }
        }
      }

      if (event.key === 'ArrowUp') {
        if (playermove === groundLevel && !isJumping && canJump) {
          isJumping = true
          jumpingUp = true
        }
        if (playermove > groundLevel && canJump) {
          playermove -= 200
        }
      }
      if (event.keyCode === 27) {
        paused = true
      }
      if (event.key === 'f') {
        extraSpeed -= 0.5
      }
      if (event.key === 's') {
        extraSpeed += 0.5
      }
      if (event.key === 'r') {
        extraSpeed = 0
      }
    })
  </script>
</body>

</html>
