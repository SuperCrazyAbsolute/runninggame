Running Game 3D version 0.1

<head>
  <title>Running Game 3D (0.1)</title>
  <style>
    html,
    body {
      margin: 0;
      padding: 0;
      overflow: hidden;

    canvas {

    #skipTutorial {

      color: black;
      border: none;
      border-radius: 10px;
      z-index: 10;
    }

    #settings {
      position: absolute;
      top: 62%;
      left: 50%;
      transform: translate(-50%, -50%);
      padding: 7px 16px;
      font-size: 17px;
      cursor: pointer;

    #hard {

    #easy {
      position: absolute;

      z-index: 10;
    }

    #resume {
      position: absolute;
      top: 10%;

      transform: translate(-50%, -50%);

      background-color: green;
      color: black;
      border: none;

<body>
  <div id="title">
    Running Game (test) /Main File
  </div>
  <button id="startButton">Play now</button>
  <button id="skipTutorial">Skip intro</button>
  <button id="resume" class="hidden">Resume</button>
  <button id="settings">Settings</button>
  <button id="hard" class="hidden">Hard mode</button>
  <button id="easy" class="hidden">Easy mode</button>
  <canvas id="gameCanvas"></canvas>
  <script>
    // This is the complete recoding of the running game (RG), originally in 2d.
    // explanation: the player still uses arrow keys to move,
    // 		but it is in a style more similar to minion rush or temple run.
    // 		however, it is still a unique game.
    // movements: left and right to change lanes (but not outside of the lanes), 
    // 		up to jump (or move front up on vehicles and such) 
    // 		(this may kill the player on hard modes if there is a roof), 
    // 		down to slide/dig (depending on ground type) or stop the jump (harder modes).
    // 		this is the same on other devices, such as mobile
    // things to change:
    // 		change the obstacles from (right to left) to (back to front while growing).
    // 		add different ground types
    // 		change the "low difficulty" obstacle from small egg to math.random()
    // 		change player to a back view and take away outlines
    // 		smoothen jumping and sliding
    // 		add in "biomes" (different themes with different obstacles, backgrounds, and music)
    // 		add in food to collect for points but not a trail (too obvious path)
    // 		make characters unlockable and customizable
    // 		add milestone rooms (after specific time)
    // 			these will tell the player their score, what the difficulty has changed to,
    // 			and offer choice of the next biome (random is also an option)
    // 		health loss will be based on speed and obstacle type, 
    // 			and will be shown as a bar on the top of the screen.
    // 		there will be a "death screen" that shows the player's score, 
    // 			and offers to restart or go to the main menu
    // 		obstacles will only speed up on tile edges but stay smooth and consistent
    // 		name the difficulties: granny, easy, medium, hard, insane, olympian 
    // 			(add + or - to show in between difficulties)
    // 			(olympian mode is no kidding, it is for less than 1% of players to get to)
    // 		add in a percentile ranking system and record highscores and averages
    // 		there are 5 lanes, but lane 1 and 5 are disabled on certain modes
    // mark off the things that are done (as in delete)
    const canvas = document.getElementById('gameCanvas')
    const ctx = canvas.getContext('2d')
    canvas.width = window.innerWidth
    canvas.height = window.innerHeight
    let intro = true //tutorial in the beginning
    let speederSpeed = 0.003 //how quickly game speeds up
    let extraSpeed = 10 //speeds game up (lower number means higher speed)
    let health = 10 //allows the player to survive slight hits
    let canLoseHealth = true
    let choice = 3 //which obstacle (or obstacle set) shows up
    let choiceB = 1
    let canChoose = true
    let canChooseB = true
    let points = 0 //the player's actual score (not the displayed score)
    let gainPoints = true
    let obstacleType = 0 //obstacle's height
    let obstacleLength = 0
    let obstacleTypeB = 0
    let obstacleDown = canvas.height / 2 //obstacle's distance from the top of the screen
    let obstacleDownB = -500
    let obstacleSpeed = 1 //speed obstacle goes down
    let obstacleSpeedB = 1
    let obstacleSpeedUp = 0.003 //how quickly the obstacle speed increases (disconnected from extraSpeed)
    let obstacleSide = canvas.width / 2//obstacle's distance from the left side of the screen
    let obstacleSideB = -500 //start ouside of screen
    let obstacleMoving = true
    let obstacleLane = 3
    let canJump = true
    let canDig = true
    let canSlide = true
    let canStopJump = true
    let obstacleOpacity = 0 //opacity of the obstacle (will be changed to an image later)
    let obstacleColor = `rgba(255,255,255,${obstacleOpacity})` //placeholder; actual opacity applied per-frame below
    let obstacleColorB = 'gray'
    let playerLeft = 180 //players left side
    let playerSide = canvas.width / 2 - 60 //players distance from the left side of the screen
    let playerTop = canvas.height / 10 * 9 - 100 //player's distance from the top of the screen
    const groundLevel = 730 //actual ground level (horizon line is slighly higher to make it realistic)
    const jumpHeight = 400 //the height of the player's jump
    let jumpspeed = 100 //the speed of the jump and fall
    let gravity = 25 //the gravity affecting the jump
    let jumpingUp = false
    let fallingDown = false
    let isJumping = false
    let diggingDown = false
    let comingUp = false
    let isDigging = false
    let paused = false
    let canContinue = true //affects whether or not to continue the game loop
    let canSlow = true
    let obstacleBAhead = false //puts the secondary obstacle ahead of the first instead of together
    let difficulty = 1 //affects specific game properties
    let frameDelay = 25 //delay beteen frames (40 FPS defualt, 25 miliseconds)

    function resizeCanvas() {
      canvas.width = window.innerWidth
      canvas.height = window.innerHeight
      playerLeft = canvas.width / 2 - 60
    }
    window.addEventListener('resize', resizeCanvas)
    resizeCanvas()
    document.getElementById('startButton').addEventListener('click', () => {
      document.getElementById('title').classList.add('hidden')
      document.getElementById('startButton').classList.add('hidden')
      document.getElementById('skipTutorial').classList.add('hidden')
      document.getElementById('settings').classList.add('hidden')
      if (intro) {
        //tutorial (TBD)
      }
      canContinue = true
      gameLoop()
    })
    function gameLoop() {
      if (!canContinue) return
      ctx.clearRect(0, 0, canvas.width, canvas.height)// delete outdated graphics

      ctx.fillStyle = 'lightblue' //background color (will be changed to an image later)
      ctx.fillRect(0, 0, canvas.width, canvas.height) //background (placeholder)

      ctx.fillStyle = 'green' //ground color (will be changed to an image later)
      ctx.fillRect(canvas.width / 3, canvas.height / 2, canvas.width / 3, canvas.height) //ground (placeholder)

      ctx.fillStyle = 'purple' //lane divider 1 (will become part of the ground image later)
      ctx.fillRect(canvas.width / 9 * 4 - 3, canvas.height / 2, 6, canvas.height) //lane divider 1 (placeholder)

      ctx.fillStyle = 'purple' //lane divider 2 (will become part of the ground image later)
      ctx.fillRect(canvas.width / 9 * 5 - 3, canvas.height / 2, 6, canvas.height) //lane divider 2 (placeholder)
      // notes for ground: the veiw is diagonal, so the ground will be a trapezoid with the top 
      // edge shorter than the bottom edge, and the sides slanting inwards. 
      // the player will be at the back but not all the way back, and the obstacles will come from the 
      // top of the screen and move down towards the player while growing slowly.
      // notes for obstacles: there are 3 zones: far, when obstacles are visible but not a threat,
      // player zone, when they are a threat and stop growing, and
      // past, when they are very close and start to slide out of the screen and become more transparent.
      ctx.fillStyle = `rgba(255,255,255,${obstacleOpacity})` //obstacle (placeholder) — compute with current opacity
      ctx.fillRect(obstacleSide, obstacleDown, obstacleLength, obstacleType) //obstacle (placeholder)

      ctx.fillStyle = 'blue' //player (placeholder)
      ctx.fillRect(playerSide, playerTop, 120, 135) //TODO: finish player dimensions and change to an image later



      obstacleDown += obstacleSpeed
      obstacleSpeed += obstacleSpeedUp //decrease speed (based on veiwpoint)
      obstacleSpeedUp -= 0.00001 //decrease the rate of speed increase (based on veiwpoint)
      console.log('obstacleSpeed:', obstacleSpeed, 'obstacleSpeedUp:', obstacleSpeedUp)
      // obstacleSpeedUp may become negative
      if (obstacleSpeedUp <= 0) {
        console.log('reached negative obstacleSpeedUp')
      }
      if (obstacleSpeedUp <= 0.0001) {
        obstacleSpeed += 0.1 //make up for speed loss and disapear faster
      }
      obstacleSide -= obstacleSpeedUp * 200 //3D effect (literal: sliding to the side as it gets closer)
      obstacleLength += obstacleSpeedUp * 400 //3D effect (literal: growing as it gets closer)
      obstacleType += obstacleSpeedUp * 400 //3D effect (literal: growing as it gets closer)
      // the obstacle shopuld speed up and growing should slow down

      obstacleOpacity += 0.1 //obstacle becomes more opaque as it gets closer(far zone)
      obstacleOpacity = Math.min(1, obstacleOpacity) //cap opacity at 1
      if (obstacleDown >= 835) { //past zone (dissapear faster)
        obstacleDown += 10
        obstacleOpacity -= 0.25
        obstacleLength -= 100
        obstacleSide += 50
      }
      if (obstacleDown > canvas.height) { //reset obstacle after it goes past the player
        obstacleOpacity = 0
        obstacleSide = canvas.width / 2
        obstacleLength = 0
        obstacleType = 0
        obstacleSpeedUp = 0.003
        obstacleSpeed = 1
        obstacleLane = Math.floor(Math.random() * 3) + 1 //random lane (1-3) (ineffective)
        //choosing code here
        obstacleDown = canvas.height / 2 - 10 //must be last to avoid visual glitches
      }
      setTimeout(() => {
        if (!paused) {
          requestAnimationFrame(gameLoop)
        }
        else {
          canContinue = false
        }
      }, frameDelay) //delay between frames (1 millisecond maximum)
    }
    document.addEventListener('keydown', (event) => {
      if (event.code === 'ArrowUp' && canJump) {
        //jump code here
      }
      if (event.code === 'ArrowDown' && canDig) {
        //dig/slide code here
      }
      if (event.code === 'ArrowLeft') {
        playerSide -= canvas.width / 9
      }
      if (event.code === 'ArrowRight') {
        playerSide += canvas.width / 9
      }
      if (event.code === 'KeyT') {
        if (frameDelay === 300) {
          frameDelay = 25
        }
        else {
          frameDelay = 300
        }
      }
    })
    if (event.code === 'KeyY') {
      playerSide = -1000
      // teleport actual player outside the screen for testing purposes (will be deleted later)
    }
  </script>
</body>

</html>
